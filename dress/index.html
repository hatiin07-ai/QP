<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>큐피 💖 의상</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --bg: #fffbfb;
    --card: #fff;
    --point: #E8A0A0;
    --accent: #f87cba;
    --txt: #3D3D3D;
    --sub: #8C8C8C;
    --border: rgba(232,160,160,0.25);
  }
  html { scroll-behavior:smooth; }
  body { font-family:'Pretendard',sans-serif; background:var(--bg); color:var(--txt); }

  /* ---- Navbar ---- */
  .nav { position:sticky; top:0; z-index:50; background:rgba(255,251,251,.95); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); }
  .nav-inner { max-width:1000px; margin:0 auto; padding:0 40px; height:56px; display:flex; align-items:center; justify-content:center; gap:0; }
  .nav-tab { position:relative; padding:12px 24px; font-size:.875rem; font-weight:500; color:var(--sub); text-decoration:none; transition:color .25s; }
  .nav-tab::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:0; height:2px; background:var(--accent); border-radius:1px; transition:width .3s; }
  .nav-tab:hover { color:var(--accent); }
  .nav-tab:hover::after { width:60%; }
  .nav-tab.active { color:var(--accent); }
  .nav-tab.active::after { width:100%; }
  @media(max-width:768px) { .nav-tab { padding:10px 16px; font-size:.8125rem; } .nav-inner { padding:0 16px; } }

  /* ---- Page ---- */
  .page-wrap { max-width:1000px; margin:0 auto; padding:0 40px 80px; }
  .page-header { padding:44px 0 28px; }
  .page-eyebrow { font-family:'Poppins',sans-serif; font-size:11px; font-weight:600; color:var(--accent); letter-spacing:.25em; text-transform:uppercase; margin-bottom:8px; opacity:.8; }
  .page-title { font-family:'Poppins',sans-serif; font-size:34px; font-weight:700; color:var(--txt); margin-bottom:6px; }
  .page-sub { font-size:13px; color:var(--sub); line-height:1.7; }

  /* ---- Cat Tabs ---- */
  .cat-tabs { display:flex; gap:8px; margin-bottom:36px; flex-wrap:wrap; }
  .cat-tab { padding:8px 20px; border-radius:999px; border:1.5px solid var(--border); background:var(--card); font-size:13px; font-weight:500; color:var(--sub); cursor:pointer; font-family:inherit; transition:all .18s; }
  .cat-tab:hover { border-color:var(--point); color:var(--accent); }
  .cat-tab.active { background:#fff0f7; border-color:var(--accent); color:var(--accent); font-weight:700; }

  /* ---- Section ---- */
  .section { margin-bottom:52px; }
  .section.hidden { display:none; }
  .section-head { display:flex; align-items:center; gap:12px; margin-bottom:20px; padding-bottom:12px; border-bottom:2px solid #ffd6ec; }
  .section-title { font-family:'Poppins',sans-serif; font-size:20px; font-weight:700; color:var(--txt); }
  .section-count { font-size:11px; background:#fff0f7; color:var(--accent); padding:3px 10px; border-radius:20px; font-weight:600; border:1px solid #ffd6ec; }

  /* ---- Grid ---- */
  .item-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .item-grid.outfit-grid { grid-template-columns:repeat(4,1fr); }
  @media(max-width:768px) {
    .item-grid { grid-template-columns:repeat(2,1fr); gap:10px; }
    .item-grid.outfit-grid { grid-template-columns:repeat(2,1fr); }
    .page-wrap { padding-left:20px; padding-right:20px; }
    .page-title { font-size:26px; }
  }

  /* ---- Item Card ---- */
  .item-card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    overflow:hidden;
    transition:all .2s ease;
    cursor:pointer;
    opacity:0;
    animation:fadeUp .4s ease forwards;
  }
  .item-card:hover { transform:translateY(-4px); box-shadow:0 10px 28px rgba(232,160,160,.15); border-color:var(--point); }
  .item-img { width:100%; aspect-ratio:3/4; position:relative; overflow:hidden; background:#f7f0f5; display:flex; align-items:center; justify-content:center; font-size:32px; }
  .item-img img { width:100%; height:100%; object-fit:cover; object-position:top center; display:block; transition:transform .3s ease; }
  .item-card:hover .item-img img { transform:scale(1.04); }
  .badge-wrap { position:absolute; bottom:8px; left:8px; display:flex; flex-direction:column; gap:4px; z-index:1; }
  .badge { font-size:9px; font-weight:700; padding:2px 8px; border-radius:20px; white-space:nowrap; background:#fff0f7; color:#c2557a; border:1px solid #ffd6ec; width:fit-content; }
  .item-info { padding:12px 14px 14px; }
  .item-name { font-size:13px; font-weight:700; color:var(--txt); margin-bottom:4px; }
  .item-desc { font-size:11px; color:var(--sub); line-height:1.5; }

  /* ---- Event Glow ---- */
  @keyframes dress-event-glow {
    0%,100% { box-shadow:var(--glow-off, 0 0 0 0 rgba(248,124,186,0)); }
    50% { box-shadow:var(--glow-on, 0 0 14px 4px rgba(248,124,186,.4)); }
  }
  .item-card.is-event { animation:fadeUp .4s ease forwards, dress-event-glow 2.5s ease-in-out 0.4s infinite; }

  /* ---- Lightbox ---- */
  .lightbox { position:fixed; inset:0; background:rgba(0,0,0,.85); backdrop-filter:blur(8px); z-index:999; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .2s; }
  .lightbox.open { opacity:1; pointer-events:all; }
  .lightbox img { max-width:min(560px,90vw); max-height:85vh; border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,.5); transform:scale(.95); transition:transform .25s cubic-bezier(.34,1.56,.64,1); }
  .lightbox.open img { transform:scale(1); }
  .lightbox-close { position:absolute; top:20px; right:24px; color:white; font-size:32px; cursor:pointer; opacity:.7; line-height:1; }
  .lightbox-close:hover { opacity:1; }
  .lightbox-caption { position:absolute; bottom:24px; left:50%; transform:translateX(-50%); color:white; font-size:14px; font-weight:600; white-space:nowrap; background:rgba(0,0,0,.4); padding:6px 16px; border-radius:20px; }

  /* ---- Spinner ---- */
  .spinner { width:28px; height:28px; border-radius:50%; border:3px solid #ffd6ec; border-top-color:var(--accent); animation:spin .8s linear infinite; margin:60px auto; display:block; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

  footer { text-align:center; padding:40px 0 20px; font-size:12px; color:#bbb; border-top:1px solid var(--border); margin-top:20px; }
  footer span { color:var(--accent); }
</style>
</head>
<body>

<!-- Navbar — 헤더 연결 전 임시 -->
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-tab">프로필</a>
    <a href="/schedule/" class="nav-tab">일정</a>
    <a href="https://qpsong.pages.dev/" class="nav-tab">노래책</a>
    <a href="/dress/" class="nav-tab active">의상</a>
    <a href="https://docs.google.com/spreadsheets/d/1s8W28tCubobvUJpWrqBweR5AEsUPaJP9-HZquMvk0JU/edit?gid=57272350#gid=57272350" class="nav-tab" target="_blank">업보</a>
  </div>
</nav>

<div class="page-wrap">
  <div class="page-header">
    <p class="page-eyebrow">Wardrobe</p>
    <h1 class="page-title">큐피 의상 목록 💖</h1>
    <p class="page-sub">큐피의 헤어, 렌즈, 의상 타입을 확인해요<br>이미지 클릭하면 크게 볼 수 있어요</p>
  </div>

  <div class="cat-tabs">
    <button class="cat-tab active" onclick="filterCat('hair',this)">헤어</button>
    <button class="cat-tab" onclick="filterCat('lens',this)">렌즈</button>
    <button class="cat-tab" onclick="filterCat('outfit',this)">의상</button>
  </div>

  <div id="loading"><div class="spinner"></div></div>

  <div id="sec-hair" class="section"></div>
  <div id="sec-lens" class="section"></div>
  <div id="sec-outfit" class="section"></div>
</div>

<footer>
  <p>© 2026 QP 💖 · <span>둥이</span>들과 함께하는 방송</p>
</footer>

<div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLb()">
  <span class="lightbox-close" onclick="closeLb()">×</span>
  <img id="lb-img" src="" alt="">
  <span class="lightbox-caption" id="lb-cap"></span>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script>
const ICONS = { hair:'💇', lens:'👁️', outfit:'👗' };
const LABELS = { hair:'헤어', lens:'렌즈', outfit:'의상 ON / OFF' };
let allItems = [];

async function load() {
  const { data } = await supabaseClient.from('dress_items').select('*').order('sort_order').order('created_at');
  allItems = data || [];
  document.getElementById('loading').style.display = 'none';
  renderAll('hair');
}

function renderSection(cat, items) {
  const el = document.getElementById('sec-' + cat);
  const catItems = items.filter(i => i.category === cat);
  if (!catItems.length) { el.innerHTML = ''; return; }

  el.innerHTML = `
    <div class="section-head">
      <h2 class="section-title">${LABELS[cat]}</h2>
      <span class="section-count">${catItems.length} 타입</span>
    </div>
    <div class="item-grid${cat==='outfit'?' outfit-grid':''}">
      ${catItems.map((item, idx) => {
        const badges = (item.badges||[]).map(b => `<span class="badge">${b.label}</span>`).join('');
        const imgHtml = item.image_url
          ? `<img src="${item.image_url}" alt="${item.name}" loading="lazy">`
          : `<span>${ICONS[cat]}</span>`;
        const evCls = item.is_event ? ' is-event' : '';
        let glowStyle = '';
        if (item.is_event && item.glow_color) {
          const c = item.glow_color;
          const r = parseInt(c.slice(1,3),16), g = parseInt(c.slice(3,5),16), b = parseInt(c.slice(5,7),16);
          glowStyle = `--glow-off:0 0 0 0 rgba(${r},${g},${b},0);--glow-on:0 0 14px 4px rgba(${r},${g},${b},.45);border-color:${c};`;
        }
        return `<div class="item-card${evCls}" style="${glowStyle}animation-delay:${idx*0.06}s" onclick="lb('${item.image_url||''}','${item.name||''}')">
          <div class="item-img">
            ${badges ? `<div class="badge-wrap">${badges}</div>` : ''}
            ${imgHtml}
          </div>
          <div class="item-info">
            <p class="item-name">${item.name}</p>
            ${item.description ? `<p class="item-desc">${item.description}</p>` : ''}
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function renderAll(filter) {
  filter = filter || 'hair';
  ['hair','lens','outfit'].forEach(cat => {
    const sec = document.getElementById('sec-'+cat);
    if (filter !== cat) { sec.classList.add('hidden'); return; }
    sec.classList.remove('hidden');
    renderSection(cat, allItems);
  });
}

function filterCat(cat, el) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderAll(cat);
}

function lb(src, cap) {
  if (!src) return;
  document.getElementById('lb-img').src = src;
  document.getElementById('lb-cap').textContent = cap;
  document.getElementById('lightbox').classList.add('open');
}
function closeLb() { document.getElementById('lightbox').classList.remove('open'); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeLb(); });

load();
</script>
</body>
</html>
