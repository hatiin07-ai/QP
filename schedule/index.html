<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>큐피 💖 일정</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { bg:'#FFF8F6', card:'#FFF0ED', point:'#E8A0A0', accent:'#D4727A', txt:'#3D3D3D', sub:'#8C8C8C', thead:'#F5D5D5' },
        fontFamily: { sans:['Pretendard','sans-serif'], poppins:['Poppins','sans-serif'] }
      }}
    }
  </script>
  <style>
    html{scroll-behavior:smooth}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#FFF8F6}::-webkit-scrollbar-thumb{background:#E0D6D6;border-radius:3px}
    .nav-tab{position:relative;padding:12px 24px;font-size:.875rem;font-weight:500;color:#8C8C8C;transition:color .25s;text-decoration:none}
    .nav-tab::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:2px;background:#D4727A;border-radius:1px;transition:width .3s}
    .nav-tab:hover{color:#D4727A}.nav-tab:hover::after{width:60%}.nav-tab.active{color:#D4727A}.nav-tab.active::after{width:100%}
    @media(max-width:768px){.nav-tab{padding:10px 16px;font-size:.8125rem}}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
    .cal-header{text-align:center;font-size:.8125rem;font-weight:600;color:#8C8C8C;padding:8px 0}
    .cal-header:first-child{color:#D4727A}.cal-header:last-child{color:#7BA0D4}
    .cal-cell{min-height:90px;background:#fff;border-radius:12px;border:.5px solid rgba(232,160,160,.15);padding:6px 8px;transition:all .2s;cursor:default;position:relative}
    .cal-cell:hover{border-color:#E8A0A0;box-shadow:0 2px 12px rgba(232,160,160,.1)}
    .cal-cell.empty{background:transparent;border-color:transparent}.cal-cell.empty:hover{box-shadow:none}
    .cal-cell.today{border-color:#D4727A;box-shadow:0 0 0 1px #D4727A}
    .cal-day-num{font-size:.8125rem;font-weight:600;color:#3D3D3D;margin-bottom:4px}
    .cal-cell:nth-child(7n+1) .cal-day-num{color:#D4727A}.cal-cell:nth-child(7n) .cal-day-num{color:#7BA0D4}
    .cal-event{font-size:.6875rem;padding:3px 6px;border-radius:6px;margin-bottom:2px;color:#fff;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:opacity .2s}
    .cal-event:hover{opacity:.85}
    .cal-event.highlight{animation:pulse-glow 2s ease-in-out infinite}
    @keyframes pulse-glow{0%,100%{box-shadow:0 0 0 0 rgba(212,114,122,.3)}50%{box-shadow:0 0 8px 2px rgba(212,114,122,.3)}}
    .modal-backdrop{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
    .modal-backdrop.open{display:flex}
    .modal-content{background:#FFF8F6;border-radius:20px;padding:28px;max-width:400px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.15)}
    .legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
    @media(max-width:768px){.cal-cell{min-height:60px;padding:4px;border-radius:8px}.cal-day-num{font-size:.75rem}.cal-event{font-size:.5625rem;padding:2px 4px;border-radius:4px}.cal-header{font-size:.6875rem}}
  </style>
</head>
<body class="bg-bg min-h-screen font-sans">
  <nav class="sticky top-0 z-50 bg-bg/95 backdrop-blur-sm border-b border-point/20">
    <div class="max-w-4xl mx-auto flex items-center justify-center">
      <a href="/" class="nav-tab">프로필</a>
      <a href="/schedule/" class="nav-tab active">일정</a>
      <a href="#" class="nav-tab" data-tab="songbook">노래책</a>
      <a href="#" class="nav-tab" data-tab="upbo">업보</a>
    </div>
  </nav>
  <main class="max-w-4xl mx-auto px-4 pb-16">
    <section class="pt-8 pb-4">
      <div class="flex items-center justify-between mb-6">
        <button onclick="changeMonth(-1)" class="w-10 h-10 rounded-full bg-white border border-point/20 flex items-center justify-center text-accent hover:bg-card transition">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <h2 id="calMonth" class="text-xl md:text-2xl font-bold text-txt font-poppins"></h2>
        <button onclick="changeMonth(1)" class="w-10 h-10 rounded-full bg-white border border-point/20 flex items-center justify-center text-accent hover:bg-card transition">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div class="flex flex-wrap items-center justify-center gap-4 mb-4">
        <div class="flex items-center gap-2"><div class="legend-dot" style="background:#D4727A"></div><span class="text-xs text-sub">방송</span></div>
        <div class="flex items-center gap-2"><div class="legend-dot" style="background:#8C8C8C"></div><span class="text-xs text-sub">휴방</span></div>
        <div class="flex items-center gap-2"><div class="legend-dot" style="background:#9F7AEA"></div><span class="text-xs text-sub">이벤트</span></div>
        <div class="flex items-center gap-2"><div class="legend-dot" style="background:#48BB78"></div><span class="text-xs text-sub">콜라보</span></div>
        <div class="flex items-center gap-2"><div class="legend-dot" style="background:#ED8936"></div><span class="text-xs text-sub">기타</span></div>
      </div>
    </section>
    <section>
      <div class="cal-grid mb-2">
        <div class="cal-header">일</div><div class="cal-header">월</div><div class="cal-header">화</div><div class="cal-header">수</div><div class="cal-header">목</div><div class="cal-header">금</div><div class="cal-header">토</div>
      </div>
      <div class="cal-grid" id="calBody"></div>
    </section>
    <section class="mt-8">
      <h3 class="text-lg font-bold text-txt mb-4">다가오는 일정</h3>
      <div id="upcomingList" class="space-y-3"></div>
    </section>
  </main>
  <div class="modal-backdrop" id="eventModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="flex items-start justify-between mb-4">
        <div><div id="modalColor" class="w-3 h-3 rounded-full inline-block mr-2" style="vertical-align:middle"></div><span id="modalType" class="text-xs text-sub uppercase tracking-wider"></span></div>
        <button onclick="document.getElementById('eventModal').classList.remove('open')" class="text-sub hover:text-txt">✕</button>
      </div>
      <h3 id="modalTitle" class="text-xl font-bold text-txt mb-2"></h3>
      <p id="modalDate" class="text-sm text-sub mb-1"></p>
      <p id="modalTime" class="text-sm text-sub mb-3"></p>
      <p id="modalDesc" class="text-sm text-txt leading-relaxed"></p>
    </div>
  </div>
  <footer class="text-center py-8 text-sub text-xs border-t border-point/10"><p>© 2026 QP 💖</p></footer>
  <script src="/js/supabase-config.js"></script>
  <script>
    let currentYear,currentMonth;let schedules=[];
    const TYPE_COLORS={'broadcast':'#D4727A','休放':'#8C8C8C','event':'#9F7AEA','collab':'#48BB78','other':'#ED8936'};
    const TYPE_LABELS={'broadcast':'방송','休放':'휴방','event':'이벤트','collab':'콜라보','other':'기타'};
    function init(){const n=new Date();currentYear=n.getFullYear();currentMonth=n.getMonth();loadMonth()}
    async function loadMonth(){document.getElementById('calMonth').textContent=`${currentYear}년 ${currentMonth+1}월`;
      const s=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-01`;const e=new Date(currentYear,currentMonth+1,0);
      const eStr=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(e.getDate()).padStart(2,'0')}`;
      try{const{data,error}=await supabase.from('schedules').select('*').gte('event_date',s).lte('event_date',eStr).order('event_date').order('event_time');
        if(error)throw error;schedules=data||[]}catch(e){console.error(e);schedules=[]}
      renderCalendar();renderUpcoming()}
    function renderCalendar(){const body=document.getElementById('calBody');body.innerHTML='';
      const firstDay=new Date(currentYear,currentMonth,1).getDay();const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();const today=new Date();
      for(let i=0;i<firstDay;i++)body.innerHTML+='<div class="cal-cell empty"></div>';
      for(let d=1;d<=daysInMonth;d++){const ds=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isToday=today.getFullYear()===currentYear&&today.getMonth()===currentMonth&&today.getDate()===d;
        const dayEv=schedules.filter(s=>s.event_date===ds);let evH='';
        dayEv.forEach(ev=>{const c=ev.color||TYPE_COLORS[ev.event_type]||'#D4727A';const hl=ev.highlight?' highlight':'';const t=ev.event_time?ev.event_time.slice(0,5)+' ':'';
          evH+=`<div class="cal-event${hl}" style="background:${c}" onclick="showEvent('${ev.id}')" title="${ev.title}">${t}${ev.title}</div>`});
        body.innerHTML+=`<div class="cal-cell${isToday?' today':''}"><div class="cal-day-num">${d}</div>${evH}</div>`}}
    function renderUpcoming(){const list=document.getElementById('upcomingList');const today=new Date().toISOString().split('T')[0];
      const up=schedules.filter(s=>s.event_date>=today).slice(0,5);
      if(!up.length){list.innerHTML='<p class="text-sm text-sub">예정된 일정이 없습니다</p>';return}
      list.innerHTML=up.map(ev=>{const c=ev.color||TYPE_COLORS[ev.event_type]||'#D4727A';const l=TYPE_LABELS[ev.event_type]||ev.event_type;
        const t=ev.event_time?ev.event_time.slice(0,5):'';const dd=new Date(ev.event_date+'T00:00:00');
        const ds=`${dd.getMonth()+1}/${dd.getDate()} (${'일월화수목금토'[dd.getDay()]})`;
        return`<div class="flex items-center gap-4 p-4 bg-white rounded-xl border border-point/10 hover:border-point/30 transition cursor-pointer" onclick="showEvent('${ev.id}')">
          <div class="w-1 h-10 rounded-full flex-shrink-0" style="background:${c}"></div>
          <div class="flex-1 min-w-0"><div class="font-semibold text-txt text-sm">${ev.title}</div><div class="text-xs text-sub">${ds} ${t?'· '+t:''}</div></div>
          <span class="text-xs px-2 py-1 rounded-full flex-shrink-0" style="background:${c}20;color:${c}">${l}</span></div>`}).join('')}
    function showEvent(id){const ev=schedules.find(s=>s.id===id);if(!ev)return;
      const c=ev.color||TYPE_COLORS[ev.event_type]||'#D4727A';const l=TYPE_LABELS[ev.event_type]||ev.event_type;
      const dd=new Date(ev.event_date+'T00:00:00');const ds=`${currentYear}년 ${dd.getMonth()+1}월 ${dd.getDate()}일 (${'일월화수목금토'[dd.getDay()]})`;
      document.getElementById('modalColor').style.background=c;document.getElementById('modalType').textContent=l;
      document.getElementById('modalTitle').textContent=ev.title;document.getElementById('modalDate').textContent=ds;
      document.getElementById('modalTime').textContent=ev.event_time?ev.event_time.slice(0,5):'';
      document.getElementById('modalDesc').textContent=ev.description||'';document.getElementById('eventModal').classList.add('open')}
    function closeModal(e){if(e.target===e.currentTarget)document.getElementById('eventModal').classList.remove('open')}
    function changeMonth(o){currentMonth+=o;if(currentMonth<0){currentMonth=11;currentYear--}if(currentMonth>11){currentMonth=0;currentYear++}loadMonth()}
    init();
  </script>
</body>
</html>
