<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=700, height=120">
  <title>큐피 오버레이</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 700px;
      height: 120px;
      background: transparent;
      font-family: 'Pretendard', sans-serif;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }

    .overlay-bar {
      display: inline-flex;
      align-items: center;
      gap: 20px;
      padding: 14px 36px 14px 14px;
      background: rgba(30, 30, 30, 0.65);
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      opacity: 0;
      transform: translateX(-30px);
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      max-width: 680px;
      margin: 10px;
    }

    .overlay-bar.visible {
      transform: translateX(0);
      opacity: 1;
    }

    .profile-img {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(212, 114, 122, 0.6);
      flex-shrink: 0;
      position: relative;
      z-index: 2;
    }

    .song-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
      flex-shrink: 1;
      overflow: hidden;
    }

    .song-title {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
    }

    .song-title.rolling {
      overflow: hidden;
    }

    .rolling-inner {
      display: inline-block;
      white-space: nowrap;
    }

    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .song-meta {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .song-artist {
      font-size: 20px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.6);
    }

    .streamer-name {
      font-size: 20px;
      font-weight: 600;
      color: #FFB8C0;
    }

    .music-icon {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: auto;
      padding-left: 20px;
    }

    .music-bar {
      width: 4px;
      border-radius: 2px;
      background: #E8A0A0;
      animation: eq 0.8s ease-in-out infinite alternate;
    }
    .music-bar:nth-child(1) { height: 16px; animation-delay: 0s; }
    .music-bar:nth-child(2) { height: 24px; animation-delay: 0.15s; }
    .music-bar:nth-child(3) { height: 14px; animation-delay: 0.3s; }
    .music-bar:nth-child(4) { height: 22px; animation-delay: 0.1s; }

    @keyframes eq {
      0% { height: 6px; }
      100% { height: 28px; }
    }
  </style>
</head>
<body>
  <div class="overlay-bar" id="overlayBar">
    <img class="profile-img" id="profileImg" src="https://qpsong.pages.dev/assets/overlay/profile.jpg" alt="큐피">
    <div class="song-info">
      <div class="song-title" id="songTitle"></div>
      <div class="song-meta">
        <span class="song-artist" id="songArtist"></span>
        <span class="streamer-name">🎤 큐피</span>
      </div>
    </div>
    <div class="music-icon">
      <div class="music-bar"></div>
      <div class="music-bar"></div>
      <div class="music-bar"></div>
      <div class="music-bar"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://dpditjxvhmfxkxbtgaak.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwZGl0anh2aG1meGt4YnRnYWFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODUzMDAsImV4cCI6MjA5MjI2MTMwMH0.Or4Yh8OaS44TMBFQZ1uNqnOMnmepo6HCN3Wc_FP57XI';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const bar = document.getElementById('overlayBar');
    const titleEl = document.getElementById('songTitle');
    const artistEl = document.getElementById('songArtist');

    let lastState = null;

    function applyOverlay(data) {
      if (data.is_visible && data.song_title) {
        titleEl.textContent = data.song_title;
        artistEl.textContent = data.song_artist || '';
        bar.classList.add('visible');
        setTimeout(checkRolling, 100);
      } else {
        bar.classList.remove('visible');
        titleEl.classList.remove('rolling');
        titleEl.style.animation = '';
      }
    }

    function checkRolling() {
      titleEl.classList.remove('rolling');
      titleEl.style.animation = '';
      titleEl.innerHTML = titleEl.textContent;

      const textWidth = titleEl.scrollWidth;
      const containerWidth = titleEl.parentElement.offsetWidth;

      if (textWidth > containerWidth) {
        const text = titleEl.textContent;
        const gap = '\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0';
        titleEl.innerHTML = '<span class="rolling-inner">' + text + gap + text + gap + '</span>';
        const innerEl = titleEl.querySelector('.rolling-inner');
        const halfWidth = (textWidth + 12 * 6) ; // text + gap width approx
        // Measure actual half
        const fullWidth = innerEl.scrollWidth / 2;
        const duration = fullWidth / 70;
        innerEl.style.animation = `marquee ${duration}s linear infinite`;
      }
    }

    async function poll() {
      try {
        const { data, error } = await sb.from('overlay_state').select('*').eq('id', 1).single();
        if (error) throw error;

        const key = `${data.is_visible}-${data.song_title}-${data.song_artist}`;
        if (key === lastState) return;
        lastState = key;

        applyOverlay(data);
      } catch (e) {
        console.error('Poll error:', e);
      }
    }

    // Realtime subscription
    sb.channel('overlay')
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'overlay_state' }, (payload) => {
        applyOverlay(payload.new);
      })
      .subscribe();

    // Fallback polling every 5s
    poll();
    setInterval(poll, 5000);

    // Custom image via URL param: ?img=URL
    const params = new URLSearchParams(window.location.search);
    if (params.get('img')) {
      document.getElementById('profileImg').src = params.get('img');
    }
  </script>
</body>
</html>
