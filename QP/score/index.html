<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>큐피 종합게임 대회 점수판</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0eeea;
    --border: #dddbd5;
    --border2: #c8c5be;
    --text: #1a1916;
    --sub: #6b6860;
    --pink: #c4365e;
    --pink-dim: #fdeef3;
    --pink-mid: #e05078;
    --teal: #0e7a6a;
    --teal-dim: #e6f5f2;
    --amber: #b86a00;
    --amber-dim: #fff3e0;
    --purple: #5b44c2;
    --purple-dim: #eeebfb;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2.5rem 400px 5rem;
  }
  h1.title {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--pink);
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }
  .subtitle { font-size: 0.85rem; color: var(--sub); margin-bottom: 2rem; }

  /* PLAYER SETUP */
  .player-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 2rem;
  }
  .player-input-wrap { position: relative; }
  .player-num {
    position: absolute;
    left: 11px; top: 50%;
    transform: translateY(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--sub);
    font-weight: 500;
  }
  .player-input {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 10px 10px 34px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .player-input:focus { border-color: var(--pink); }
  .player-input::placeholder { color: #bbb; }

  /* SECTION */
  .section {
    margin-bottom: 1.5rem;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface);
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    background: var(--surface2);
    border-bottom: 1.5px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .section-header:hover { background: #e8e6e0; }
  .sec-num {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--sub);
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 5px;
    padding: 3px 9px;
    font-weight: 500;
  }
  .sec-name { font-size: 17px; font-weight: 700; color: var(--text); }
  .sec-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 700;
    margin-left: auto;
    letter-spacing: 0.03em;
  }
  .badge-solo { background: var(--teal-dim); color: var(--teal); }
  .badge-tour { background: var(--purple-dim); color: var(--purple); }
  .sec-pts { font-size: 12px; color: var(--sub); font-family: 'DM Mono', monospace; font-weight: 500; }
  .chevron { color: var(--sub); font-size: 13px; transition: transform 0.2s; margin-left: 6px; }
  .section-body { padding: 20px; }
  .section.collapsed .section-body { display: none; }
  .section.collapsed .chevron { transform: rotate(-90deg); }

  /* PTS REF */
  .pts-ref {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .pts-chip {
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    color: var(--sub);
    font-weight: 400;
  }
  .pts-chip span { color: var(--text); font-weight: 700; }

  /* RANK GRID — 세로 3칸 레이아웃 */
  .rounds-wrap { display: flex; flex-direction: column; gap: 20px; }
  .round-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--sub);
    letter-spacing: 0.05em;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .rank-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .rank-item {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .rank-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 56px;
    padding: 10px 8px;
    background: var(--surface);
    border-right: 1.5px solid var(--border);
  }
  .rank-num {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .rank-num.r1 { color: var(--pink); }
  .rank-num.r2 { color: var(--amber); }
  .rank-num.r3 { color: var(--purple); }
  .rank-pt {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--sub);
    margin-top: 2px;
    font-weight: 500;
  }
  .rank-select {
    flex: 1;
    background: transparent;
    border: none;
    padding: 10px 10px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    outline: none;
    cursor: pointer;
    -webkit-appearance: none;
  }
  .rank-select:focus { background: var(--pink-dim); }
  .rank-item.filled { border-color: var(--border2); background: #fff; }
  .rank-item.filled .rank-badge { background: var(--surface2); }

  /* TOURNAMENT */
  .bracket { display: flex; flex-direction: column; gap: 20px; }
  .bracket-round-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--sub);
    letter-spacing: 0.06em;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .matches { display: flex; gap: 10px; flex-wrap: wrap; }
  .match-card {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    min-width: 170px;
    flex: 1;
  }
  .match-label { font-size: 11px; color: var(--sub); margin-bottom: 10px; font-family: 'DM Mono', monospace; font-weight: 500; letter-spacing: 0.05em; }
  .match-players { display: flex; flex-direction: column; gap: 6px; }
  .match-player {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 14px;
    font-weight: 500;
    user-select: none;
    background: var(--surface);
    border-color: var(--border);
  }
  .match-player:hover { border-color: var(--border2); background: #fff; }
  .match-player.winner { background: var(--pink-dim); border-color: var(--pink-mid); color: var(--pink); font-weight: 700; }
  .match-player.loser { opacity: 0.35; }
  .match-player .p-name { flex: 1; }
  .match-player .w-mark { font-size: 10px; font-family: 'DM Mono', monospace; font-weight: 700; }
  .vs-divider { font-size: 11px; color: var(--border2); text-align: center; font-family: 'DM Mono', monospace; }
  .tour-select {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 9px 10px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    outline: none;
    cursor: pointer;
    -webkit-appearance: none;
  }
  .tour-select:focus { border-color: var(--pink); }
  .tour-select.filled { border-color: var(--border2); }
  .win-btn-row { display: flex; gap: 6px; margin-top: 10px; }
  .win-btn {
    flex: 1;
    padding: 8px 6px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--sub);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
  }
  .win-btn:hover { border-color: var(--pink); color: var(--pink); }
  .win-btn.active { border-color: var(--pink); background: var(--pink-dim); color: var(--pink); }

  /* SCOREBOARD */
  .scoreboard {
    padding: 1.5rem 0 1.5rem;
    margin-bottom: 2rem;
    border-bottom: 2px solid var(--border);
  }
  .scoreboard-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--sub);
    letter-spacing: 0.1em;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .score-header {
    display: grid;
    grid-template-columns: 28px 1fr repeat(5, 52px) 64px;
    gap: 4px;
    padding: 0 12px 8px;
    font-size: 11px;
    color: var(--sub);
    letter-spacing: 0.05em;
    font-weight: 700;
    text-transform: uppercase;
  }
  .score-header span { text-align: center; }
  .score-header span:nth-child(2) { text-align: left; }
  .score-header span:last-child { text-align: right; }
  .score-rows { display: flex; flex-direction: column; gap: 5px; }
  .score-row {
    display: grid;
    grid-template-columns: 28px 1fr repeat(5, 52px) 64px;
    gap: 4px;
    align-items: center;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    background: var(--surface);
    border: 1.5px solid var(--border);
  }
  .score-row.rank1 { background: var(--pink-dim); border-color: #f0b8c8; }
  .score-row.rank2 { background: var(--amber-dim); border-color: #f0d090; }
  .score-row.rank3 { background: var(--purple-dim); border-color: #c8c0f0; }
  .sr-rank { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--sub); font-weight: 700; }
  .sr-rank.r1 { color: var(--pink); }
  .sr-rank.r2 { color: var(--amber); }
  .sr-rank.r3 { color: var(--purple); }
  .sr-name { font-weight: 700; font-size: 15px; color: var(--text); }
  .sr-cell { font-family: 'DM Mono', monospace; font-size: 13px; color: #bbb; text-align: center; }
  .sr-cell.has-score { color: var(--text); font-weight: 500; }
  .sr-total { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 700; text-align: right; color: var(--pink); }

  .reset-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--sub);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--pink); color: var(--pink); }

  @media (max-width: 900px) {
    body { padding: 1.5rem 1.5rem 4rem; }
  }
</style>
</head>
<body>

<h1 class="title">큐피 종합게임 대회</h1>
<p class="subtitle">점수 집계 시트 · 참가자 이름 입력 후 각 종목 결과를 기록하세요</p>

<div class="player-grid" id="playerGrid"></div>

<div class="scoreboard">
  <div class="scoreboard-title">Live Standings</div>
  <div class="score-header">
    <span>#</span>
    <span>참가자</span>
    <span>사과</span>
    <span>컬러</span>
    <span>테트리스</span>
    <span>오목</span>
    <span>알까기</span>
    <span>합계</span>
  </div>
  <div class="score-rows" id="scoreRows"></div>
  <button class="reset-btn" onclick="resetAll()">↺ 전체 초기화</button>
</div>

<div id="sections"></div>

<script>
const SOLO_PTS = [12, 9, 7, 5, 4, 3, 2, 1];
const TOUR_PTS = { win:24, runner:12, semi:6, quarter:3 };

function freshTour() {
  return {
    qf: [{p1:-1,p2:-1,w:-1},{p1:-1,p2:-1,w:-1},{p1:-1,p2:-1,w:-1},{p1:-1,p2:-1,w:-1}],
    sf: [{p1:-1,p2:-1,w:-1},{p1:-1,p2:-1,w:-1}],
    f:  {p1:-1,p2:-1,w:-1}
  };
}

const state = {
  players: ['','','','','','','',''],
  apple:  [Array(8).fill(0), Array(8).fill(0), Array(8).fill(0)],
  color:  [Array(8).fill(0), Array(8).fill(0), Array(8).fill(0)],
  tetris: Array(8).fill(0),
  omok:   freshTour(),
  marble: freshTour()
};

const collapsed = { apple:false, color:false, tetris:false, omok:false, marble:false };

function pname(i) { return (state.players[i]||'').trim() || `P${i+1}`; }

function calcScores() {
  const sc = Array.from({length:8}, ()=>({apple:0,color:0,tetris:0,omok:0,marble:0}));
  ['apple','color'].forEach(key => {
    state[key].forEach(round => {
      round.forEach((rank,p) => { if(rank>0) sc[p][key] += SOLO_PTS[rank-1]; });
    });
  });
  state.tetris.forEach((rank,p) => { if(rank>0) sc[p].tetris = SOLO_PTS[rank-1]; });
  ['omok','marble'].forEach(key => {
    const t = state[key];
    t.qf.forEach(m => {
      if(m.w>=0) { const l=m.w===m.p1?m.p2:m.p1; if(l>=0) sc[l][key]=Math.max(sc[l][key],TOUR_PTS.quarter); }
    });
    t.sf.forEach(m => {
      if(m.w>=0) { const l=m.w===m.p1?m.p2:m.p1; if(l>=0) sc[l][key]=Math.max(sc[l][key],TOUR_PTS.semi); }
    });
    if(t.f.w>=0) {
      const l=t.f.w===t.f.p1?t.f.p2:t.f.p1;
      if(l>=0) sc[l][key]=Math.max(sc[l][key],TOUR_PTS.runner);
      sc[t.f.w][key]=Math.max(sc[t.f.w][key],TOUR_PTS.win);
    }
  });
  return sc;
}

function renderScoreboard() {
  const sc = calcScores();
  const rows = Array.from({length:8},(_,i)=>({i,...sc[i],total:Object.values(sc[i]).reduce((a,b)=>a+b,0)}));
  rows.sort((a,b)=>b.total-a.total);
  document.getElementById('scoreRows').innerHTML = rows.map((r,rank)=>{
    const cls=rank===0?'rank1':rank===1?'rank2':rank===2?'rank3':'';
    const rcls=rank===0?'r1':rank===1?'r2':rank===2?'r3':'';
    const rnk=rank<3?['①','②','③'][rank]:`${rank+1}`;
    return `<div class="score-row ${cls}">
      <span class="sr-rank ${rcls}">${rnk}</span>
      <span class="sr-name">${pname(r.i)}</span>
      <span class="sr-cell ${r.apple?'has-score':''}">${r.apple||'-'}</span>
      <span class="sr-cell ${r.color?'has-score':''}">${r.color||'-'}</span>
      <span class="sr-cell ${r.tetris?'has-score':''}">${r.tetris||'-'}</span>
      <span class="sr-cell ${r.omok?'has-score':''}">${r.omok||'-'}</span>
      <span class="sr-cell ${r.marble?'has-score':''}">${r.marble||'-'}</span>
      <span class="sr-total">${r.total}pt</span>
    </div>`;
  }).join('');
}

function renderPlayers() {
  document.getElementById('playerGrid').innerHTML = Array.from({length:8},(_,i)=>`
    <div class="player-input-wrap">
      <span class="player-num">P${i+1}</span>
      <input class="player-input" type="text" placeholder="참가자 ${i+1}" maxlength="10"
        value="${state.players[i]}"
        oninput="state.players[${i}]=this.value; renderAll()">
    </div>`).join('');
}

// SOLO — 세로 3칸 그리드
function renderSoloSection(key, rounds) {
  const arr = state[key];
  let html = `<div class="pts-ref">${SOLO_PTS.map((p,i)=>`<span class="pts-chip">${i+1}위 <span>${p}pt</span></span>`).join('')}</div><div class="rounds-wrap">`;
  for (let r=0; r<rounds; r++) {
    const round = arr[r];
    const assigned = new Set(round.map((rank,p)=>rank>0?p:-1).filter(p=>p>=0));
    html += `<div><div class="round-label">${rounds>1?`${r+1}판`:'단판'}</div><div class="rank-grid">`;
    for (let rank=1; rank<=8; rank++) {
      const curPlayer = round.indexOf(rank);
      const rcls = rank===1?'r1':rank===2?'r2':rank===3?'r3':'';
      html += `<div class="rank-item ${curPlayer>=0?'filled':''}">
        <div class="rank-badge">
          <div class="rank-num ${rcls}">${rank}위</div>
          <div class="rank-pt">${SOLO_PTS[rank-1]}pt</div>
        </div>
        <select class="rank-select" onchange="setSoloRank('${key}',${r},${rank},parseInt(this.value))">
          <option value="-1"${curPlayer<0?' selected':''}>--</option>
          ${Array.from({length:8},(_,p)=>{
            if(assigned.has(p)&&p!==curPlayer) return '';
            return `<option value="${p}" ${curPlayer===p?'selected':''}>${pname(p)}</option>`;
          }).join('')}
        </select>
      </div>`;
    }
    html += `</div></div>`;
  }
  return html + `</div>`;
}

function setSoloRank(key, round, rank, playerIdx) {
  const arr = state[key][round];
  arr.forEach((_,p)=>{ if(arr[p]===rank) arr[p]=0; });
  if(playerIdx>=0) arr[playerIdx]=rank;
  renderAll();
}

function renderTetrisSection() {
  const assigned = new Set(state.tetris.map((rank,p)=>rank>0?p:-1).filter(p=>p>=0));
  let html = `<div class="pts-ref">${SOLO_PTS.map((p,i)=>`<span class="pts-chip">${i+1}위 <span>${p}pt</span></span>`).join('')}</div><div><div class="round-label">단판</div><div class="rank-grid">`;
  for (let rank=1; rank<=8; rank++) {
    const curPlayer = state.tetris.indexOf(rank);
    const rcls = rank===1?'r1':rank===2?'r2':rank===3?'r3':'';
    html += `<div class="rank-item ${curPlayer>=0?'filled':''}">
      <div class="rank-badge">
        <div class="rank-num ${rcls}">${rank}위</div>
        <div class="rank-pt">${SOLO_PTS[rank-1]}pt</div>
      </div>
      <select class="rank-select" onchange="setTetrisRank(${rank},parseInt(this.value))">
        <option value="-1"${curPlayer<0?' selected':''}>--</option>
        ${Array.from({length:8},(_,p)=>{
          if(assigned.has(p)&&p!==curPlayer) return '';
          return `<option value="${p}" ${curPlayer===p?'selected':''}>${pname(p)}</option>`;
        }).join('')}
      </select>
    </div>`;
  }
  return html + `</div></div>`;
}

function setTetrisRank(rank, playerIdx) {
  state.tetris.forEach((_,p)=>{ if(state.tetris[p]===rank) state.tetris[p]=0; });
  if(playerIdx>=0) state.tetris[playerIdx]=rank;
  renderAll();
}

// TOURNAMENT
function renderTourSection(key) {
  const t = state[key];
  let html = `<div class="bracket">`;
  html += `<div class="bracket-round"><div class="bracket-round-title">8강 — 4경기 동시</div><div class="matches">`;
  for(let m=0;m<4;m++) html += renderQFMatch(key,m);
  html += `</div></div>`;
  html += `<div class="bracket-round"><div class="bracket-round-title">4강 — 2경기 동시</div><div class="matches">`;
  for(let m=0;m<2;m++) html += renderSFMatch(key,m);
  html += `</div></div>`;
  html += `<div class="bracket-round"><div class="bracket-round-title">결승</div><div class="matches">`;
  html += renderFMatch(key);
  html += `</div></div></div>`;
  return html;
}

function usedInOtherQF(key, matchIdx) {
  const used = new Set();
  state[key].qf.forEach((m,mi)=>{ if(mi===matchIdx) return; if(m.p1>=0) used.add(m.p1); if(m.p2>=0) used.add(m.p2); });
  return used;
}

function renderQFMatch(key, mi) {
  const m = state[key].qf[mi];
  const {p1,p2,w} = m;
  const used = usedInOtherQF(key, mi);
  let html = `<div class="match-card"><div class="match-label">경기 ${mi+1}</div><div class="match-players">
    <select class="tour-select ${p1>=0?'filled':''}" style="margin-bottom:6px" onchange="setQFPlayer('${key}',${mi},0,parseInt(this.value))">
      <option value="-1"${p1<0?' selected':''}>참가자 선택</option>
      ${Array.from({length:8},(_,i)=>{ if(used.has(i)||i===p2) return ''; return `<option value="${i}" ${p1===i?'selected':''}>${pname(i)}</option>`; }).join('')}
    </select>
    <div class="vs-divider">vs</div>
    <select class="tour-select ${p2>=0?'filled':''}" style="margin-top:6px" onchange="setQFPlayer('${key}',${mi},1,parseInt(this.value))">
      <option value="-1"${p2<0?' selected':''}>참가자 선택</option>
      ${Array.from({length:8},(_,i)=>{ if(used.has(i)||i===p1) return ''; return `<option value="${i}" ${p2===i?'selected':''}>${pname(i)}</option>`; }).join('')}
    </select>`;
  if(p1>=0&&p2>=0) {
    html += `<div class="win-btn-row">
      <button class="win-btn ${w===p1?'active':''}" onclick="setQFWinner('${key}',${mi},${p1})">${pname(p1)}</button>
      <button class="win-btn ${w===p2?'active':''}" onclick="setQFWinner('${key}',${mi},${p2})">${pname(p2)}</button>
    </div>`;
  }
  return html + `</div></div>`;
}

function renderSFMatch(key, mi) {
  const m = state[key].sf[mi];
  const {p1,p2,w} = m;
  const lbl1=p1>=0?pname(p1):'(8강 승자)';
  const lbl2=p2>=0?pname(p2):'(8강 승자)';
  const can=p1>=0&&p2>=0;
  return `<div class="match-card"><div class="match-label">경기 ${mi+1}</div><div class="match-players">
    <div class="match-player ${p1>=0&&w===p1?'winner':p1>=0&&w>=0?'loser':''}" ${can?`onclick="setSFWinner('${key}',${mi},${p1})"`:''}>
      <span class="p-name">${lbl1}</span>${w===p1?'<span class="w-mark">WIN</span>':''}
    </div>
    <div class="vs-divider" style="padding:3px 0">vs</div>
    <div class="match-player ${p2>=0&&w===p2?'winner':p2>=0&&w>=0?'loser':''}" ${can?`onclick="setSFWinner('${key}',${mi},${p2})"`:''}>
      <span class="p-name">${lbl2}</span>${w===p2?'<span class="w-mark">WIN</span>':''}
    </div>
  </div></div>`;
}

function renderFMatch(key) {
  const f = state[key].f;
  const {p1,p2,w} = f;
  const lbl1=p1>=0?pname(p1):'(4강 승자)';
  const lbl2=p2>=0?pname(p2):'(4강 승자)';
  const can=p1>=0&&p2>=0;
  return `<div class="match-card"><div class="match-label">결승전</div><div class="match-players">
    <div class="match-player ${p1>=0&&w===p1?'winner':p1>=0&&w>=0?'loser':''}" ${can?`onclick="setFWinner('${key}',${p1})"`:''}>
      <span class="p-name">${lbl1}</span>${w===p1?'<span class="w-mark">WIN</span>':''}
    </div>
    <div class="vs-divider" style="padding:3px 0">vs</div>
    <div class="match-player ${p2>=0&&w===p2?'winner':p2>=0&&w>=0?'loser':''}" ${can?`onclick="setFWinner('${key}',${p2})"`:''}>
      <span class="p-name">${lbl2}</span>${w===p2?'<span class="w-mark">WIN</span>':''}
    </div>
  </div></div>`;
}

function setQFPlayer(key,mi,slot,playerIdx) {
  const m=state[key].qf[mi];
  if(slot===0) m.p1=playerIdx; else m.p2=playerIdx;
  m.w=-1;
  const sf=state[key].sf[Math.floor(mi/2)];
  if(mi%2===0) sf.p1=-1; else sf.p2=-1;
  sf.w=-1; state[key].f.p1=-1; state[key].f.p2=-1; state[key].f.w=-1;
  renderAll();
}
function setQFWinner(key,mi,winnerIdx) {
  const m=state[key].qf[mi]; m.w=winnerIdx;
  const sf=state[key].sf[Math.floor(mi/2)];
  if(mi%2===0) sf.p1=winnerIdx; else sf.p2=winnerIdx;
  sf.w=-1; state[key].f.p1=-1; state[key].f.p2=-1; state[key].f.w=-1;
  renderAll();
}
function setSFWinner(key,mi,winnerIdx) {
  state[key].sf[mi].w=winnerIdx;
  const f=state[key].f;
  if(mi===0) f.p1=winnerIdx; else f.p2=winnerIdx;
  f.w=-1; renderAll();
}
function setFWinner(key,winnerIdx) { state[key].f.w=winnerIdx; renderAll(); }

const sectionDefs = [
  {key:'apple', label:'사과 게임', num:1, type:'solo',   rounds:3},
  {key:'color', label:'컬러 타일', num:2, type:'solo',   rounds:3},
  {key:'tetris',label:'테트리스',  num:3, type:'tetris'          },
  {key:'omok',  label:'오목',      num:4, type:'tour'            },
  {key:'marble',label:'알까기',    num:5, type:'tour'            },
];

function toggleSection(key) { collapsed[key]=!collapsed[key]; renderSections(); }

function renderSections() {
  document.getElementById('sections').innerHTML = sectionDefs.map(def=>{
    const isTour=def.type==='tour';
    const badge=isTour?`<span class="sec-badge badge-tour">토너먼트</span>`:`<span class="sec-badge badge-solo">개인전</span>`;
    const maxPts=isTour?'24pt':def.rounds?`${def.rounds}×12pt`:'12pt';
    let body='';
    if(def.type==='solo') body=renderSoloSection(def.key,def.rounds);
    else if(def.type==='tetris') body=renderTetrisSection();
    else body=renderTourSection(def.key);
    return `<div class="section ${collapsed[def.key]?'collapsed':''}">
      <div class="section-header" onclick="toggleSection('${def.key}')">
        <span class="sec-num">0${def.num}</span>
        <span class="sec-name">${def.label}</span>
        ${badge}
        <span class="sec-pts">최대 ${maxPts}</span>
        <span class="chevron">▾</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
  }).join('');
}

function renderAll() { renderSections(); renderScoreboard(); }

function resetAll() {
  if(!confirm('전체 점수를 초기화할까요?')) return;
  state.apple=[Array(8).fill(0),Array(8).fill(0),Array(8).fill(0)];
  state.color=[Array(8).fill(0),Array(8).fill(0),Array(8).fill(0)];
  state.tetris=Array(8).fill(0);
  state.omok=freshTour(); state.marble=freshTour();
  renderAll();
}

renderPlayers();
renderAll();
</script>
</body>
</html>
