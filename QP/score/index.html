<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>큐피 vs 단츄 대회 스코어보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0eeea;
  --border: #dddbd5;
  --border2: #c8c5be;
  --ink: #1a1916;
  --sub: #6b6860;
  --rose: #c4365e;
  --rose-light: #fbeef3;
  --rose-mid: #e05078;
  --blue: #1e5fa8;
  --blue-light: #e8f0fb;
  --blue-mid: #2d72c4;
  --gold: #a07828;
  --gold-light: #fdf5e4;
  --green: #1a7a50;
  --green-light: #e8f5ef;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  padding: 2.5rem 400px 5rem;
}
h1.title {
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--ink);
  text-transform: uppercase;
  margin-bottom: 0.3rem;
}
.subtitle { font-size: 0.9rem; color: var(--sub); margin-bottom: 2rem; }

/* PLAYER SETUP */
.setup-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 2rem;
}
.team-setup {
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.team-setup-head {
  padding: 12px 18px;
  font-size: 15px;
  font-weight: 700;
  border-bottom: 1.5px solid var(--border);
}
.team-setup-head.a { background: var(--rose-light); color: var(--rose); }
.team-setup-head.b { background: var(--blue-light); color: var(--blue); }
.team-setup-body { padding: 10px 12px; background: var(--surface); display: flex; flex-direction: column; gap: 6px; }
.player-row { display: flex; align-items: center; gap: 8px; }
.player-lbl {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  min-width: 36px;
  color: var(--sub);
}
.player-lbl.captain-a { color: var(--rose); }
.player-lbl.captain-b { color: var(--blue); }
.player-input {
  flex: 1;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  color: var(--ink);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  font-weight: 500;
  outline: none;
  transition: border-color 0.2s;
}
.player-input:focus { border-color: var(--rose); }
.player-input.b:focus { border-color: var(--blue); }
.player-input::placeholder { color: #bbb; font-weight: 400; }

/* SCOREBOARD */
.scoreboard {
  margin-bottom: 2rem;
}
.score-header-row {
  display: grid;
  grid-template-columns: 1fr 100px 1fr;
  gap: 0;
  margin-bottom: 1rem;
  align-items: stretch;
}
.team-score-card {
  border: 2px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.team-score-head {
  padding: 12px 18px;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.05em;
}
.team-score-head.a { background: var(--rose-light); color: var(--rose); border-bottom: 1.5px solid #f0b8c8; }
.team-score-head.b { background: var(--blue-light); color: var(--blue); border-bottom: 1.5px solid #b8d0f0; }
.team-score-num {
  font-family: 'DM Mono', monospace;
  font-size: 4.5rem;
  font-weight: 700;
  text-align: center;
  padding: 16px 0;
  background: var(--surface);
  line-height: 1;
}
.team-score-num.a { color: var(--rose); }
.team-score-num.b { color: var(--blue); }
.score-mid {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 0 8px;
}
.vs-label {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--sub);
  letter-spacing: 0.1em;
}
.match-count {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: var(--sub);
}
.status-badge {
  font-size: 12px;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 20px;
  text-align: center;
  white-space: nowrap;
}
.status-tie { background: var(--surface2); color: var(--sub); border: 1px solid var(--border); }
.status-a { background: var(--rose-light); color: var(--rose); border: 1px solid #f0b8c8; }
.status-b { background: var(--blue-light); color: var(--blue); border: 1px solid #b8d0f0; }
.status-tiebreak { background: var(--gold-light); color: var(--gold); border: 1px solid #e0c870; }

/* MATCH TABLE */
.match-section { margin-bottom: 1.5rem; }
.match-sec-title {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--sub);
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.match-list { display: flex; flex-direction: column; gap: 6px; }
.match-row {
  display: grid;
  grid-template-columns: 36px 100px 1fr 56px 1fr 70px;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  transition: border-color 0.15s;
}
.match-row.win-a { border-left: 4px solid var(--rose); background: #fff8fa; }
.match-row.win-b { border-left: 4px solid var(--blue); background: #f6f9ff; }
.match-num {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--sub);
  font-weight: 700;
  text-align: center;
}
.match-game {
  font-size: 14px;
  font-weight: 700;
  color: var(--sub);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.player-select {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  padding: 7px 10px;
  color: var(--ink);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  font-weight: 500;
  outline: none;
  cursor: pointer;
  -webkit-appearance: none;
  transition: border-color 0.15s;
}
.player-select.team-a:focus { border-color: var(--rose); }
.player-select.team-b:focus { border-color: var(--blue); }
.player-select.selected-a { border-color: #f0b8c8; background: var(--rose-light); }
.player-select.selected-b { border-color: #b8d0f0; background: var(--blue-light); }
.win-btns { display: flex; gap: 4px; }
.win-btn {
  flex: 1;
  padding: 7px 4px;
  border-radius: 5px;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  font-size: 13px;
  font-weight: 700;
  font-family: 'DM Mono', monospace;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--sub);
  white-space: nowrap;
}
.win-btn.active-a { background: var(--rose-light); border-color: var(--rose); color: var(--rose); }
.win-btn.active-b { background: var(--blue-light); border-color: var(--blue); color: var(--blue); }
.win-btn:hover { border-color: var(--border2); }

/* TIEBREAK */
.tiebreak-row {
  display: grid;
  grid-template-columns: 32px 90px 1fr 48px 1fr 60px;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--gold-light);
  border: 1.5px solid #e0c870;
  border-radius: var(--radius-sm);
  margin-top: 6px;
}
.tiebreak-label { font-size: 12px; font-weight: 700; color: var(--gold); }

/* MEMBER LIST */
.members-display { display: flex; flex-direction: column; gap: 4px; margin-top: 4px; }
.member-chip {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--sub);
}
.member-chip .cnt {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
  font-weight: 700;
}
.cnt-ok { background: var(--green-light); color: var(--green); }
.cnt-warn { background: #fff3e0; color: #b86a00; }
.cnt-full { background: #fdeef3; color: var(--rose); }

.reset-btn {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 1rem;
  background: transparent; border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); color: var(--sub);
  font-family: 'Noto Sans KR', sans-serif; font-size: 13px;
  padding: 8px 16px; cursor: pointer; transition: all 0.2s;
}
.reset-btn:hover { border-color: var(--rose); color: var(--rose); }

/* PARTICIPATION TRACKER */
.tracker-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 1.5rem;
}
.tracker-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.tracker-head {
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 700;
  border-bottom: 1px solid var(--border);
}
.tracker-head.a { background: var(--rose-light); color: var(--rose); }
.tracker-head.b { background: var(--blue-light); color: var(--blue); }
.tracker-body { padding: 10px 14px; display: flex; flex-direction: column; gap: 6px; }
.tracker-row {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 14px; color: var(--ink);
}
.tracker-dots { display: flex; gap: 4px; }
.dot {
  width: 10px; height: 10px; border-radius: 50%;
  border: 1.5px solid var(--border2);
  background: var(--surface2);
  transition: background 0.15s;
}
.dot.used-a { background: var(--rose); border-color: var(--rose-mid); }
.dot.used-b { background: var(--blue); border-color: var(--blue-mid); }

@media (max-width: 900px) {
  body { padding: 1.5rem 1rem 4rem; }
  .setup-grid { grid-template-columns: 1fr; }
  .score-header-row { grid-template-columns: 1fr 60px 1fr; }
  .match-row { grid-template-columns: 28px 1fr 1fr 50px; }
  .tracker-wrap { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<h1 class="title">큐피 vs 단츄 종합게임 대회</h1>
<p class="subtitle">스코어보드 · 참가자 이름 입력 후 경기 결과를 기록하세요</p>

<!-- 선수 입력 -->
<div class="setup-grid" id="setupGrid"></div>

<!-- 출전 횟수 트래커 -->
<div class="match-sec-title">출전 횟수 (인당 최대 2회)</div>
<div class="tracker-wrap" id="trackerWrap"></div>

<!-- 스코어보드 -->
<div class="scoreboard">
  <div class="match-sec-title">총 점수</div>
  <div class="score-header-row">
    <div class="team-score-card">
      <div class="team-score-head a">🌸 큐피팀</div>
      <div class="team-score-num a" id="scoreA">0</div>
    </div>
    <div class="score-mid">
      <div class="vs-label">VS</div>
      <div class="match-count" id="matchCount">0 / 10</div>
      <div class="status-badge status-tie" id="statusBadge">진행 전</div>
    </div>
    <div class="team-score-card">
      <div class="team-score-head b">🎵 단츄팀</div>
      <div class="team-score-num b" id="scoreB">0</div>
    </div>
  </div>
</div>

<!-- 경기 목록 -->
<div class="match-section">
  <div class="match-sec-title">경기 결과</div>
  <div class="match-list" id="matchList"></div>
  <button class="reset-btn" onclick="resetAll()">↺ 전체 초기화</button>
</div>

<script>
const GAMES = ['사과 게임','사과 게임','컬러 타일','컬러 타일','테트리스','테트리스','오목','오목','알까기','알까기'];

const state = {
  teamA: ['','','','',''],  // [캡틴, P1, P2, P3, P4]
  teamB: ['','','','',''],
  matches: Array.from({length:10}, () => ({playerA:-1, playerB:-1, winner:''})), // winner: 'A'|'B'|''
  tiebreak: {playerA:-1, playerB:-1, winner:''}
};

function pA(i) { return state.teamA[i]?.trim() || (i===0?'큐피':`A${i}`); }
function pB(i) { return state.teamB[i]?.trim() || (i===0?'단츄':`B${i}`); }

// 출전 횟수 계산
function getUsage() {
  const usageA = Array(5).fill(0);
  const usageB = Array(5).fill(0);
  state.matches.forEach(m => {
    if (m.playerA >= 0) usageA[m.playerA]++;
    if (m.playerB >= 0) usageB[m.playerB]++;
  });
  if (state.tiebreak.playerA >= 0) usageA[state.tiebreak.playerA]++;
  if (state.tiebreak.playerB >= 0) usageB[state.tiebreak.playerB]++;
  return { usageA, usageB };
}

// 스코어 계산
function calcScore() {
  let a=0, b=0, done=0;
  state.matches.forEach(m => {
    if (m.winner==='A') { a++; done++; }
    else if (m.winner==='B') { b++; done++; }
  });
  return { a, b, done };
}

function getStatus(a, b, done) {
  if (done === 0) return { text:'진행 전', cls:'status-tie' };
  if (done < 10) {
    if (a > b) return { text:'큐피팀 리드', cls:'status-a' };
    if (b > a) return { text:'단츄팀 리드', cls:'status-b' };
    return { text:'동률', cls:'status-tie' };
  }
  if (a > b) return { text:'🏆 큐피팀 승리!', cls:'status-a' };
  if (b > a) return { text:'🏆 단츄팀 승리!', cls:'status-b' };
  return { text:'⚡ 팀장전!', cls:'status-tiebreak' };
}

// 렌더링
function renderSetup() {
  document.getElementById('setupGrid').innerHTML = `
    <div class="team-setup">
      <div class="team-setup-head a">🌸 큐피팀</div>
      <div class="team-setup-body">
        ${[0,1,2,3,4].map(i => `
          <div class="player-row">
            <span class="player-lbl ${i===0?'captain-a':''}">${i===0?'팀장':`P${i}`}</span>
            <input class="player-input" type="text" placeholder="${i===0?'큐피':`팀원 ${i}`}" maxlength="10"
              value="${state.teamA[i]}"
              oninput="state.teamA[${i}]=this.value; renderAll()">
          </div>`).join('')}
      </div>
    </div>
    <div class="team-setup">
      <div class="team-setup-head b">🎵 단츄팀</div>
      <div class="team-setup-body">
        ${[0,1,2,3,4].map(i => `
          <div class="player-row">
            <span class="player-lbl ${i===0?'captain-b':''}">${i===0?'팀장':`P${i}`}</span>
            <input class="player-input b" type="text" placeholder="${i===0?'단츄':`팀원 ${i}`}" maxlength="10"
              value="${state.teamB[i]}"
              oninput="state.teamB[${i}]=this.value; renderAll()">
          </div>`).join('')}
      </div>
    </div>`;
}

function renderTracker() {
  const { usageA, usageB } = getUsage();
  document.getElementById('trackerWrap').innerHTML = `
    <div class="tracker-card">
      <div class="tracker-head a">🌸 큐피팀 출전 현황</div>
      <div class="tracker-body">
        ${[0,1,2,3,4].map(i => {
          const cnt = usageA[i];
          const over = cnt > 2;
          return `<div class="tracker-row">
            <span style="font-size:13px;font-weight:500;">${pA(i)}</span>
            <div class="tracker-dots">
              <div class="dot ${cnt>=1?'used-a':''}"></div>
              <div class="dot ${cnt>=2?'used-a':''}"></div>
              ${over ? `<span style="font-size:11px;color:var(--rose);font-weight:700;margin-left:2px;">+${cnt-2}</span>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="tracker-card">
      <div class="tracker-head b">🎵 단츄팀 출전 현황</div>
      <div class="tracker-body">
        ${[0,1,2,3,4].map(i => {
          const cnt = usageB[i];
          const over = cnt > 2;
          return `<div class="tracker-row">
            <span style="font-size:13px;font-weight:500;">${pB(i)}</span>
            <div class="tracker-dots">
              <div class="dot ${cnt>=1?'used-b':''}"></div>
              <div class="dot ${cnt>=2?'used-b':''}"></div>
              ${over ? `<span style="font-size:11px;color:var(--blue);font-weight:700;margin-left:2px;">+${cnt-2}</span>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

function renderScoreboard() {
  const { a, b, done } = calcScore();
  document.getElementById('scoreA').textContent = a;
  document.getElementById('scoreB').textContent = b;
  document.getElementById('matchCount').textContent = `${done} / 10`;
  const status = getStatus(a, b, done);
  const badge = document.getElementById('statusBadge');
  badge.textContent = status.text;
  badge.className = `status-badge ${status.cls}`;
}

function optsA(selected, matchIdx) {
  const used = getUsage().usageA;
  return `<option value="-1"${selected<0?' selected':''}>-- 큐피팀 --</option>` +
    [0,1,2,3,4].map(i => {
      const cnt = used[i];
      // count without current match
      const curMatch = state.matches[matchIdx];
      const adjust = curMatch && curMatch.playerA === i ? 1 : 0;
      const effective = cnt - adjust;
      const disabled = effective >= 2 ? 'disabled' : '';
      return `<option value="${i}" ${selected===i?'selected':''} ${disabled}>${pA(i)}${effective>=2?' (출전완료)':effective===1?' (1회)':''}</option>`;
    }).join('');
}

function optsB(selected, matchIdx) {
  const used = getUsage().usageB;
  return `<option value="-1"${selected<0?' selected':''}>-- 단츄팀 --</option>` +
    [0,1,2,3,4].map(i => {
      const cnt = used[i];
      const curMatch = state.matches[matchIdx];
      const adjust = curMatch && curMatch.playerB === i ? 1 : 0;
      const effective = cnt - adjust;
      const disabled = effective >= 2 ? 'disabled' : '';
      return `<option value="${i}" ${selected===i?'selected':''} ${disabled}>${pB(i)}${effective>=2?' (출전완료)':effective===1?' (1회)':''}</option>`;
    }).join('');
}

function renderMatches() {
  const { a, b, done } = calcScore();
  const showTiebreak = done === 10 && a === b;

  let html = GAMES.map((game, idx) => {
    const m = state.matches[idx];
    const winCls = m.winner==='A'?'win-a':m.winner==='B'?'win-b':'';
    const selA = m.playerA >= 0 ? 'selected-a' : '';
    const selB = m.playerB >= 0 ? 'selected-b' : '';
    return `<div class="match-row ${winCls}">
      <div class="match-num">${String(idx+1).padStart(2,'0')}</div>
      <div class="match-game">${game}</div>
      <select class="player-select team-a ${selA}" onchange="setPlayer(${idx},'A',parseInt(this.value))">
        ${optsA(m.playerA, idx)}
      </select>
      <div class="win-btns">
        <button class="win-btn ${m.winner==='A'?'active-a':''}"
          onclick="setWinner(${idx},'A')" title="큐피팀 승">A</button>
        <button class="win-btn ${m.winner==='B'?'active-b':''}"
          onclick="setWinner(${idx},'B')" title="단츄팀 승">B</button>
      </div>
      <select class="player-select team-b ${selB}" onchange="setPlayer(${idx},'B',parseInt(this.value))">
        ${optsB(m.playerB, idx)}
      </select>
      <div style="font-size:11px;font-family:'DM Mono',monospace;text-align:right;color:${m.winner==='A'?'var(--rose)':m.winner==='B'?'var(--blue)':'var(--sub)'};">
        ${m.winner==='A'?'🌸 큐피팀':m.winner==='B'?'🎵 단츄팀':'—'}
      </div>
    </div>`;
  }).join('');

  if (showTiebreak) {
    const tb = state.tiebreak;
    html += `<div class="tiebreak-row">
      <div class="match-num" style="color:var(--gold);font-weight:700;">★</div>
      <div class="tiebreak-label">팀장전</div>
      <select class="player-select team-a ${tb.playerA>=0?'selected-a':''}" onchange="setTiePlayer('A',parseInt(this.value))">
        <option value="-1">-- 큐피팀 --</option>
        ${[0,1,2,3,4].map(i=>`<option value="${i}" ${tb.playerA===i?'selected':''}>${pA(i)}</option>`).join('')}
      </select>
      <div class="win-btns">
        <button class="win-btn ${tb.winner==='A'?'active-a':''}" onclick="setTieWinner('A')">A</button>
        <button class="win-btn ${tb.winner==='B'?'active-b':''}" onclick="setTieWinner('B')">B</button>
      </div>
      <select class="player-select team-b ${tb.playerB>=0?'selected-b':''}" onchange="setTiePlayer('B',parseInt(this.value))">
        <option value="-1">-- 단츄팀 --</option>
        ${[0,1,2,3,4].map(i=>`<option value="${i}" ${tb.playerB===i?'selected':''}>${pB(i)}</option>`).join('')}
      </select>
      <div style="font-size:11px;font-family:'DM Mono',monospace;text-align:right;color:${tb.winner==='A'?'var(--rose)':tb.winner==='B'?'var(--blue)':'var(--gold)'};">
        ${tb.winner==='A'?'🌸 큐피팀':tb.winner==='B'?'🎵 단츄팀':'핀볼추첨'}
      </div>
    </div>`;
  }

  document.getElementById('matchList').innerHTML = html;
}

function setPlayer(idx, team, playerIdx) {
  if (team==='A') state.matches[idx].playerA = playerIdx;
  else state.matches[idx].playerB = playerIdx;
  renderAll();
}
function setWinner(idx, team) {
  state.matches[idx].winner = state.matches[idx].winner === team ? '' : team;
  renderAll();
}
function setTiePlayer(team, playerIdx) {
  if (team==='A') state.tiebreak.playerA = playerIdx;
  else state.tiebreak.playerB = playerIdx;
  renderAll();
}
function setTieWinner(team) {
  state.tiebreak.winner = state.tiebreak.winner === team ? '' : team;
  renderAll();
}

function renderAll() {
  renderSetup();
  renderTracker();
  renderScoreboard();
  renderMatches();
}

function resetAll() {
  if (!confirm('전체를 초기화할까요?')) return;
  state.matches = Array.from({length:10}, () => ({playerA:-1, playerB:-1, winner:''}));
  state.tiebreak = {playerA:-1, playerB:-1, winner:''};
  renderAll();
}

renderAll();
</script>
</body>
</html>
